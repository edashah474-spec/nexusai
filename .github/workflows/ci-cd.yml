name: NexusAI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: safahu/nexusai

jobs:
  # ── TEST ──
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gateway deps
        run: |
          pip install -r services/gateway-service/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── BUILD & PUSH ──
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:latest,${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Brain Tumor Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/brain-tumor-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-brain-tumor:latest,${{ env.IMAGE_PREFIX }}-brain-tumor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Retina Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/retina-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-retina:latest,${{ env.IMAGE_PREFIX }}-retina:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── DEPLOY ──
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/deployments/
          kubectl rollout status deployment/gateway-service -n nexusai
          kubectl rollout status deployment/brain-tumor-service -n nexusai
          kubectl rollout status deployment/retina-service -n nexusai
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
